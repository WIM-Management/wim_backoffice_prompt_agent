name: release

# v* 태그 push → 테스트 → OS별 바이너리 빌드 → GitHub Release 생성·자산 업로드.
# 릴리스 절차: 버전 결정 후 `git tag vX.Y.Z && git push origin vX.Y.Z` 한 번이면 끝.
# 바이너리 버전은 태그명이 ldflags(-X main.Version)로 주입된다 — 코드 내 버전 상수 bump 불필요.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Build binaries (darwin arm64/amd64, linux amd64/arm64, windows amd64)
        run: |
          mkdir -p dist
          for target in darwin/arm64 darwin/amd64 linux/amd64 linux/arm64 windows/amd64; do
            goos="${target%/*}" goarch="${target#*/}" ext="" gui=""
            # Windows: build with the GUI subsystem (-H=windowsgui) so the
            # scheduled `run-once` doesn't flash a cmd console window every cycle.
            # The binary reattaches to a parent console for interactive commands
            # (see console_windows.go), so enroll output stays visible.
            if [ "$goos" = "windows" ]; then ext=".exe" gui="-H=windowsgui"; fi
            GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 \
              go build -trimpath \
                -ldflags "-s -w ${gui} -X main.Version=${GITHUB_REF_NAME}" \
                -o "dist/wim-backoffice-prompt-agent-${goos}-${goarch}${ext}" \
                ./cmd/wim-backoffice-prompt-agent
          done
          cd dist && sha256sum wim-backoffice-prompt-agent-* > SHA256SUMS

      - name: Publish release to public distribution repo
        env:
          # 릴리스는 이 repo(private)가 아니라 공개 배포 레포에만 발행한다 —
          # 전 사원(비 org 멤버 포함)이 인증 없이 다운로드하기 위함. 소스·태그는 여기 유지.
          # RELEASES_TOKEN: 배포 레포에 쓰기 가능한 토큰(repo secret).
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN }}
          DIST_REPO: WIM-Management/wim_backoffice_prompt_agent_releases
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::RELEASES_TOKEN repo secret이 비어 있음 — 배포 레포에 발행 불가"
            exit 1
          fi
          if gh release view "$GITHUB_REF_NAME" --repo "$DIST_REPO" >/dev/null 2>&1; then
            # 선생성된 릴리스가 있으면 자산만 교체 업로드
            gh release upload "$GITHUB_REF_NAME" dist/* --repo "$DIST_REPO" --clobber
          else
            # 배포 레포엔 소스 태그가 없으므로 --verify-tag 없이 생성(태그는 배포 레포 HEAD에 생김)
            gh release create "$GITHUB_REF_NAME" dist/* \
              --repo "$DIST_REPO" \
              --title "$GITHUB_REF_NAME" \
              --notes "wim-backoffice-prompt-agent $GITHUB_REF_NAME — OS별 바이너리 5종 + SHA256SUMS. 설치는 배포 레포 README의 원라이너 사용 권장."
          fi
