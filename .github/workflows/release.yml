name: release

# v* 태그 push → 테스트 → OS별 바이너리 빌드 → GitHub Release 생성·자산 업로드.
# 릴리스 절차: 버전 결정 후 `git tag vX.Y.Z && git push origin vX.Y.Z` 한 번이면 끝.
# 바이너리 버전은 태그명이 ldflags(-X main.Version)로 주입된다 — 코드 내 버전 상수 bump 불필요.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Build binaries (darwin arm64/amd64, linux amd64/arm64, windows amd64)
        env:
          # Google "Desktop app" OAuth 클라이언트 — 데스크톱 앱 secret은 Google 정책상
          # 기밀 아님(내장 허용). 직원이 env 설정 없이 enroll할 수 있게 바이너리에 주입한다.
          GOOGLE_CLIENT_ID: ${{ secrets.WIM_PROMPT_GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.WIM_PROMPT_GOOGLE_CLIENT_SECRET }}
        run: |
          if [ -z "$GOOGLE_CLIENT_ID" ] || [ -z "$GOOGLE_CLIENT_SECRET" ]; then
            echo "::error::WIM_PROMPT_GOOGLE_CLIENT_ID/SECRET repo secrets가 비어 있음 — enroll 불가 바이너리가 되므로 중단"
            exit 1
          fi
          CONFIG_PKG=github.com/WIM-Management/wim_backoffice_prompt_agent/internal/config
          mkdir -p dist
          for target in darwin/arm64 darwin/amd64 linux/amd64 linux/arm64 windows/amd64; do
            goos="${target%/*}" goarch="${target#*/}" ext=""
            if [ "$goos" = "windows" ]; then ext=".exe"; fi
            GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 \
              go build -trimpath \
                -ldflags "-s -w -X main.Version=${GITHUB_REF_NAME} -X ${CONFIG_PKG}.DefaultGoogleClientID=${GOOGLE_CLIENT_ID} -X ${CONFIG_PKG}.DefaultGoogleClientSecret=${GOOGLE_CLIENT_SECRET}" \
                -o "dist/wim-prompt-agent-${goos}-${goarch}${ext}" \
                ./cmd/wim-prompt-agent
          done
          cd dist && sha256sum wim-prompt-agent-* > SHA256SUMS

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            # 수동 선생성된 릴리스가 있으면 자산만 교체 업로드
            gh release upload "$GITHUB_REF_NAME" dist/* --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/* \
              --repo "$GITHUB_REPOSITORY" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes \
              --verify-tag
          fi
